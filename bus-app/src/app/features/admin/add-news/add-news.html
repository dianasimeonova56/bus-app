<div class="container mt-5">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white p-4">
      <h3 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Добавяне на Новина</h3>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="newsForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Заглавие</label>
          <input type="text" class="form-control" formControlName="title" 
                 [class.is-invalid]="newsForm.get('title')?.touched && newsForm.get('title')?.invalid"
                 placeholder="Въведете заглавие на новината...">
          @if(newsForm.get('title')?.touched && newsForm.get('title')?.invalid) {
            <div class="invalid-feedback">Заглавието е задължително (мин. 5 символа).</div>
          }
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Категория</label>
            <select class="form-select" formControlName="category">
              @for (cat of categories; track cat) {
                <option [value]="cat">{{cat}}</option>
              }
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Изображение (URL)</label>
            <input type="text" class="form-control" formControlName="imageUrl" 
                   placeholder="https://example.com/image.jpg">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Съдържание</label>
          <textarea class="form-control" formControlName="content" rows="6"
                    [class.is-invalid]="newsForm.get('content')?.touched && newsForm.get('content')?.invalid"
                    placeholder="Напишете детайли тук..."></textarea>
          @if(newsForm.get('content')?.touched && newsForm.get('content')?.invalid) {
            <div class="invalid-feedback">Съдържанието трябва да е поне 10 символа.</div>
          }
        </div>

        <div class="mb-4 form-check form-switch">
          <input class="form-check-input" type="checkbox" id="isImportant" formControlName="isImportant">
          <label class="form-check-label fw-bold" for="isImportant">Маркирай като важна (ще излиза най-отгоре)</label>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" [disabled]="newsForm.invalid">
            Публикувай новината
          </button>
          <button type="button" class="btn btn-light px-4 py-2" (click)="newsForm.reset({category: 'Новини'})">
            Изчисти
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
