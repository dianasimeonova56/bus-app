<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow border-0 overflow-hidden">
        <div class="row g-0">
          <div class="col-md-4 bg-primary d-flex flex-column justify-content-center align-items-center text-white p-4">
            <i class="bi bi-bus-front" style="font-size: 5rem;"></i>
            <h3 class="mt-3 fw-bold">Оператори</h3>
            <p class="text-center opacity-75 small">Добавете нов превозвач към системата за управление на маршрути.</p>
          </div>

          <div class="col-md-8 p-4 p-lg-5 bg-white">
            <h2 class="h4 fw-bold mb-4">Нов Транспортен Оператор</h2>
            
            <form [formGroup]="transportOperatorForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label small fw-bold">Име на фирмата</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                  <input type="text" class="form-control shadow-sm" placeholder="Име на фирмата..." formControlName="name">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Имейл адрес</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control shadow-sm" placeholder="office@company.com" formControlName="email">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Телефон</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control shadow-sm" placeholder="+359..." formControlName="phone">
                  </div>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label small fw-bold">Уебсайт</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-globe"></i></span>
                  <input type="url" class="form-control shadow-sm" placeholder="https://www.example.com" formControlName="website">
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary py-3 fw-bold rounded-pill shadow" [disabled]="transportOperatorForm.invalid">
                  Запиши Оператор
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
