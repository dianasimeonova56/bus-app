<section class="">
  <div class="container py-5">
    <div class="row d-flex align-items-center justify-content-center">
      <div class="col-md-8 col-lg-7 col-xl-6">
        <img src="assets/images/bus png.png" class="img-fluid" alt="Bus Icon">
      </div>
      <div class="col-md-7 col-lg-5 col-xl-5 offset-xl-1">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <h2 class="text-center mb-4">Login</h2>

          <div class="form-group form-outline mb-4">
            <label class="form-label" for="email">Имейл</label>
            <input id="email" class="form-control form-control-lg" formControlName="email" type="email" placeholder="Enter your email" />
            @if(isEmailValid) {
            <p class="error">
              {{ emailErrorMessage }}
            </p>
            }
          </div>

          <div class="form-group form-outline mb-4">
            <label class="form-label" for="password">Парола</label>
            <input id="password" class="form-control form-control-lg" formControlName="password" type="password" placeholder="Enter your password" />
            @if(isPasswordValid) {
            <p class="error">
              {{ passwordErrorMessage }}
            </p>
            }
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block mb-4" [disabled]="loginForm.invalid">Вписване</button>
          <p class="text-muted">
            Нямате потребителски профил?
            <a routerLink="/register" routerLinkActive="active">Регистрация</a>
          </p>
        </form>
      </div>
    </div>

  </div>
</section>
