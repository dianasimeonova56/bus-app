<article class="news-card">
  <a class="news-card-link" [routerLink]="['/news', newsItem._id]">
    <div class="news-card-media">
      <img [src]="newsItem.imageUrl || 'assets/default-news.jpg'"
           [alt]="newsItem.title"
           loading="lazy">
      <span class="news-card-badge"
            [ngClass]="{
              'badge-alert': newsItem.category === 'Аварии',
              'badge-info': newsItem.category === 'Новини',
              'badge-warn': newsItem.category === 'Промени'
            }">
        {{ newsItem.category }}
      </span>
    </div>
    <div class="news-card-body">
      <p class="news-card-date">
        <i class="bi bi-calendar3" aria-hidden="true"></i>
        {{ newsItem.createdAt | date:'dd.MM.yyyy' }}
      </p>
      <h3 class="news-card-title">{{ newsItem.title }}</h3>
      <p class="news-card-excerpt">{{ newsItem.content }}</p>
      <span class="news-card-cta">
        Прочети още
        <i class="bi bi-arrow-right" aria-hidden="true"></i>
      </span>
    </div>
  </a>
</article>
