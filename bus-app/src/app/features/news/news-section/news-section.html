<section class="py-5 bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <h2 class="fw-bold mb-0 text-primary">Последни Новини</h2>
        <p class="text-muted mb-0">Бъдете информирани за всичко важно около вашите пътувания</p>
      </div>
      <a routerLink="/news" class="btn btn-outline-primary px-4 rounded-pill">
        Виж всички
      </a>
    </div>

    @if (isLoading()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    } @else {
      <div class="row g-4">
        @for (news of latestNews(); track news._id) {
          <div class="col-md-4 animate-fade-in">
            <app-news-card [newsItem]="news"></app-news-card>
          </div>
        } @empty {
          <div class="col-12 text-center py-5">
            <p class="text-muted fs-5">В момента няма активни новини.</p>
          </div>
        }
      </div>
    }
  </div>
</section>
