<div class="route-data-wrap">
    @if(!onHomePage)
    {
    <form [formGroup]="routeFilter" class="row g-3 mb-5 align-items-end" (ngSubmit)="onSubmit()">
        <div class="col-12 col-sm-6 col-lg">
            <select class="form-select" formControlName="stop" aria-label="Изберете спирка">
                <option value="">Изберете спирка</option>
                @for (stop of allStops$ | async; track stop._id) {
                <option [value]="stop._id">{{stop.name}}</option>
                }
            </select>
        </div>

        <div class="col-12 col-sm-6 col-lg">
            <select class="form-select" formControlName="transportOperator" aria-label="Оператор">
                <option value="">Оператор</option>
                @for (operator of operators$ | async; track operator._id) {
                <option [value]="operator._id">{{operator.name}}</option>
                }
            </select>
        </div>

        <div class="col-12 col-sm-6 col-lg">
            <input type="date" class="form-control" formControlName="date" aria-label="Дата">
        </div>

        <div class="col-12 col-sm-6 col-lg time-picker">
            <input type="time" class="form-control" formControlName="time" aria-label="Час">
        </div>

        <div class="col-12 col-lg-auto">
            <button type="submit" class="btn btn-primary w-100">Търси</button>
        </div>
    </form>
    }

    <app-routes-table [data]="results" [searchedStopId]="stopId"></app-routes-table>
    @if (onHomePage) {
    <div class="view-all-wrap">
        <a [routerLink]="['/bus-stations', stationPosition]" class="view-all-link">
            <span>Виж пълното разписание</span>
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
        </a>
    </div>
    }
    @if (!onHomePage && paginationMeta && paginationMeta.totalPages > 1) {
    <nav class="pagination-wrap" aria-label="Пагинация">
        <button class="pagination-btn prev"
                type="button"
                [disabled]="!paginationMeta.hasPrevPage"
                (click)="onPageChange(currentPage - 1)"
                aria-label="Предишна страница">
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
            <span>Предишна</span>
        </button>

        <span class="pagination-info" aria-live="polite">
            <span class="pagination-current">{{ currentPage }}</span>
            <span class="pagination-sep">/</span>
            <span class="pagination-total">{{ paginationMeta.totalPages }}</span>
        </span>

        <button class="pagination-btn next"
                type="button"
                [disabled]="!paginationMeta.hasNextPage"
                (click)="onPageChange(currentPage + 1)"
                aria-label="Следваща страница">
            <span>Следваща</span>
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
    </nav>
    }
</div>
