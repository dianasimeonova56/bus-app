<div class="section-wrap routes-tabs-wrapper">
  <div class="station-picker" role="radiogroup" aria-label="Изберете автогара">
    <button type="button"
            role="radio"
            class="station-pill"
            [class.active]="station() === 'south'"
            [attr.aria-checked]="station() === 'south'"
            (click)="setStation('south')">
      <i class="bi bi-geo-alt-fill" aria-hidden="true"></i>
      <span>Автогара Юг</span>
    </button>
    <button type="button"
            role="radio"
            class="station-pill"
            [class.active]="station() === 'west'"
            [attr.aria-checked]="station() === 'west'"
            (click)="setStation('west')">
      <i class="bi bi-geo-alt-fill" aria-hidden="true"></i>
      <span>Автогара Запад</span>
    </button>
  </div>

  <div ngTabs class="tabs-card">
    <div ngTabList selectionMode="follow" selectedTab="departures" class="tabs-list" aria-label="Посока на пътуване">
      <div ngTab value="departures" class="tab-item">
        <i class="bi bi-box-arrow-up-right tab-item-icon" aria-hidden="true"></i>
        <span>Заминаващи</span>
      </div>
      <div ngTab value="arrivals" class="tab-item">
        <i class="bi bi-box-arrow-in-down-left tab-item-icon" aria-hidden="true"></i>
        <span>Пристигащи</span>
      </div>
    </div>
    <div class="tabs-sliding-window">
      <div ngTabPanel value="departures">
        <ng-template ngTabContent><app-route-data [stationPosition]="station()" [routeType]="'departures'"></app-route-data></ng-template>
      </div>
      <div ngTabPanel value="arrivals">
        <ng-template ngTabContent><app-route-data [stationPosition]="station()" [routeType]="'arrivals'"></app-route-data></ng-template>
      </div>
    </div>
  </div>
</div>
