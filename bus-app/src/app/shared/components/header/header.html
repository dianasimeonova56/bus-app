<header class="site-header fixed-top">
  <nav class="navbar navbar-expand-lg" aria-label="Главна навигация">
    <div class="section-wrap site-header-inner">
      <a class="site-brand navbar-brand" routerLink="/home" aria-label="BurgasBus — начало">
        <img src="assets/images/logo.png" alt="" class="site-brand-logo">
      </a>

      <button class="site-toggler navbar-toggler ms-auto"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Меню">
        <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center site-nav">
          <li class="nav-item">
            <a class="nav-link" routerLink="/news" routerLinkActive="active">Новини</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://transport.burgasbus.info/" target="_blank" rel="noopener">Градски разписания</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" tabindex="0" data-bs-toggle="dropdown" aria-expanded="false">
              Автогари
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" routerLink="/bus-stations/west" routerLinkActive="active">Автогара Запад</a></li>
              <li><a class="dropdown-item" routerLink="/bus-stations/south" routerLinkActive="active">Автогара Юг</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" tabindex="0" data-bs-toggle="dropdown" aria-expanded="false">
              Превозни документи
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" routerLink="/bus-subscription-cards" routerLinkActive="active">Междуградски карти</a></li>
            </ul>
          </li>

          <li class="nav-divider" aria-hidden="true"></li>

          @if (isLoggedIn()) {
            @if (role === "admin") {
              <li class="nav-item">
                <a class="nav-link" routerLink="/admin" routerLinkActive="active">
                  <i class="bi bi-shield-lock me-2 me-lg-1"></i>Админ панел
                </a>
              </li>
            }
            @if (role === "user") {
              <li class="nav-item">
                <a class="nav-link nav-icon-link" routerLink="/profile" routerLinkActive="active" title="Профил" aria-label="Профил">
                  <i class="bi bi-person-circle" aria-hidden="true"></i>
                  <span class="nav-link-label">Профил</span>
                </a>
              </li>
            }
            <li class="nav-item">
              <a class="nav-link nav-icon-link logout-link" routerLink="/logout" (click)="logout()" title="Излизане" aria-label="Излизане">
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                <span class="nav-link-label">Излизане</span>
              </a>
            </li>
          } @else {
            <li class="nav-item header-cta-wrap">
              <a class="button button-blue button-sm header-cta" routerLink="/login">
                <i class="bi bi-person me-1"></i>Вписване
              </a>
            </li>
          }
        </ul>
      </div>
    </div>
  </nav>
</header>
